name: Snyk Combined Scan (Reusable + Manual)

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository (org/repo)"
        required: true
      branch:
        description: "Branch to scan"
        required: true
        default: "main"

  workflow_call:
    inputs:
      repo:
        required: true
        type: string
      branch:
        required: true
        type: string
    secrets:
      GH_PAT:
        required: true
      SNYK_TOKEN:
        required: true
      SNYK_ORG_ID:
        required: true

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest

    env:
      SNYK_ORG_ID: ${{ secrets.SNYK_ORG_ID }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      GH_PAT: ${{ secrets.GH_PAT }} 
      SNYK_SDLC: DEVELOPMENT
      SNYK_REMOTE_REPO_URL: https://github.com/${{ inputs.repo }}
      SNYK_TARGET_REF: ${{ inputs.branch }}-${{ github.run_id }}

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GH_PAT }}
          path: target-repo

      # =========================
      # Setup Snyk
      # =========================
      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Configure Snyk
        run: |
          snyk config set endpoint=https://api.us.snyk.io
          snyk auth "$SNYK_TOKEN"

      # =========================
      # Detect Manifests
      # =========================
      - name: Detect supported app manifests
        id: detect_manifests
        working-directory: target-repo
        run: |
          if git ls-files | grep -E '(^|/)(package\.json|pom\.xml|build\.gradle|requirements\.txt|go\.mod|Gemfile)' >/dev/null; then
            echo "has_manifests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_manifests=false" >> "$GITHUB_OUTPUT"
          fi

      # =========================================================
      # 🔵 PR FLOW → SAST + SARIF ONLY
      # =========================================================
      - name: Snyk Code test (PR → SARIF)
        if: github.event_name == 'pull_request'
        working-directory: target-repo
        continue-on-error: true
        run: |
          snyk code test \
            --org="$SNYK_ORG_ID" \
            --project-tags="SDLC=$SNYK_SDLC" \
            --target-reference="$SNYK_TARGET_REF" \
            --remote-repo-url="$SNYK_REMOTE_REPO_URL" \
            --sarif-file-output=snyk-code.sarif

      - name: Upload SARIF to GitHub
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: target-repo/snyk-code.sarif

      # =========================================================
      # 🟢 RELEASE / MANUAL FLOW → FULL SCAN
      # =========================================================

      # IaC
      - name: Snyk IaC test
        if: github.event_name != 'pull_request'
        working-directory: target-repo
        continue-on-error: true
        run: |
          snyk iac test . \
            --org="$SNYK_ORG_ID" \
            --severity-threshold=low \
            --project-tags="SDLC=$SNYK_SDLC" \
            --target-reference="$SNYK_TARGET_REF" \
            --remote-repo-url="$SNYK_REMOTE_REPO_URL"

      # SCA
      - name: Snyk test (SCA)
        if: github.event_name != 'pull_request' && steps.detect_manifests.outputs.has_manifests == 'true'
        working-directory: target-repo
        continue-on-error: true
        run: |
          snyk test --all-projects \
            --detection-depth=6 \
            --org="$SNYK_ORG_ID" \
            --severity-threshold=low \
            --project-tags="SDLC=$SNYK_SDLC" \
            --target-reference="$SNYK_TARGET_REF" \
            --remote-repo-url="$SNYK_REMOTE_REPO_URL"

      - name: Snyk monitor (SCA)
        if: github.event_name != 'pull_request' && steps.detect_manifests.outputs.has_manifests == 'true'
        working-directory: target-repo
        continue-on-error: true
        run: |
          snyk monitor --all-projects \
            --org="$SNYK_ORG_ID" \
            --project-tags="SDLC=$SNYK_SDLC" \
            --target-reference="$SNYK_TARGET_REF" \
            --remote-repo-url="$SNYK_REMOTE_REPO_URL"

      # Container
      - name: Detect Dockerfile
        if: github.event_name != 'pull_request'
        id: detect_docker
        working-directory: target-repo
        run: |
          if [ -f Dockerfile ]; then
            echo "has_docker=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_docker=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image
        if: github.event_name != 'pull_request' && steps.detect_docker.outputs.has_docker == 'true'
        working-directory: target-repo
        run: |
          docker build -t local-image:${{ github.sha }} .

      - name: Snyk Container test
        if: github.event_name != 'pull_request' && steps.detect_docker.outputs.has_docker == 'true'
        working-directory: target-repo
        continue-on-error: true
        run: |
          snyk container test local-image:${{ github.sha }} \
            --org="$SNYK_ORG_ID" \
            --severity-threshold=low \
            --project-tags="SDLC=$SNYK_SDLC" \
            --target-reference="$SNYK_TARGET_REF" \
            --remote-repo-url="$SNYK_REMOTE_REPO_URL"

      - name: Snyk Container monitor
        if: github.event_name != 'pull_request' && steps.detect_docker.outputs.has_docker == 'true'
        working-directory: target-repo
        continue-on-error: true
        run: |
          snyk container monitor local-image:${{ github.sha }} \
            --org="$SNYK_ORG_ID" \
            --project-tags="SDLC=$SNYK_SDLC" \
            --target-reference="$SNYK_TARGET_REF" \
            --remote-repo-url="$SNYK_REMOTE_REPO_URL"

      # =========================
      # Final
      # =========================
      - name: Completed
        run: echo "Snyk scan completed successfully"
